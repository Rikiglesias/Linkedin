# ═══════════════════════════════════════════════════════════════════
# LinkedIn Bot — Docker Compose (Phase 8)
# Services:
#   bot       — Node.js + Playwright (il bot + API/Dashboard)
#   db        — PostgreSQL 16 con volume persistente
#   dashboard — Nginx che serve public/ statico
# ═══════════════════════════════════════════════════════════════════

services:

  # ── Database PostgreSQL ──────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: linkedin-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bot_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-linkedin_bot}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bot_user} -d ${POSTGRES_DB:-linkedin_bot}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - linkedin-net

  # ── Bot API (Express dashboard + REST API) ──────────────────────
  bot-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: linkedin-bot-api
    restart: unless-stopped
    command: ["node", "dist/index.js", "dashboard"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-bot_user}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-linkedin_bot}
      NODE_ENV: production
      TZ: Europe/Rome
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./.env:/app/.env
      - ./data:/app/data
      - ./plugins:/app/plugins
      - ./public:/app/public
    ports:
      - "3000:3000"
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:3000/api/health/deep || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - linkedin-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Bot Worker (run-loop + Playwright browser) ─────────────────
  bot-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: linkedin-bot-worker
    restart: unless-stopped
    command: ["node", "dist/index.js", "run-loop"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-bot_user}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-linkedin_bot}
      NODE_ENV: production
      TZ: Europe/Rome
    depends_on:
      db:
        condition: service_healthy
      bot-api:
        condition: service_healthy
    volumes:
      - ./.env:/app/.env
      - ./data:/app/data
      - ./plugins:/app/plugins
    # Worker non espone porte — comunica solo via DB (job queue)
    shm_size: '1gb'
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - linkedin-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Dashboard (Nginx) ────────────────────────────────────────────
  dashboard:
    image: nginx:alpine
    container_name: linkedin-dashboard
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./public:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      bot-api:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    networks:
      - linkedin-net

# ── Volumi e Reti ───────────────────────────────────────────────────
volumes:
  pg_data:
    name: linkedin_pg_data

networks:
  linkedin-net:
    name: linkedin-network
    driver: bridge
