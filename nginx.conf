# ═══════════════════════════════════════════════════════════════════════════
# NOTA: Questo nginx serve solo HTTP porta 80.
# HTTPS/TLS è delegato al reverse proxy esterno (Cloudflare, Caddy, Traefik).
# Se si espone direttamente a Internet, aggiungere TLS con Let's Encrypt
# e Strict-Transport-Security header.
# ═══════════════════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name _;

    # ── Compressione Gzip ────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # ── Header di sicurezza ──────────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(self), geolocation=()" always;

    # ── File statici (Dashboard UI) ──────────────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;

        location = /index.html {
            add_header Cache-Control "no-cache, must-revalidate";
        }
    }

    # ── Asset immutabili (JS/CSS compilati) ─────────────────────────────────
    location /assets/ {
        root /usr/share/nginx/html;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(css|png|jpg|svg|ico|woff2?)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Proxy verso API Express (bot:3000) ───────────────────────────────────
    location /api/ {
        proxy_pass http://bot-api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;

        proxy_buffering off;
        proxy_cache off;
    }

    # ── SSE endpoint (timeout lungo, no buffer) ──────────────────────────────
    location = /api/events {
        proxy_pass http://bot-api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding off;
    }

    # ── Healthcheck endpoint (no log) ────────────────────────────────────────
    location = /api/health {
        proxy_pass http://bot-api:3000;
        access_log off;
    }

    # ── Nega accesso a file nascosti ────────────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }
}
