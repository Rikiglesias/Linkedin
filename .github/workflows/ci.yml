name: CI — Quality Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Baseline: read-only per tutto il workflow; ogni job eleva solo ciò che serve
permissions:
  contents: read

# Annulla run precedenti dello stesso branch/PR per evitare code inutili
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-fast:
    name: Fast Gate (typecheck/lint/format/audit/unit)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout codice
        uses: actions/checkout@v4

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Installa dipendenze
        run: npm ci

      - name: TypeScript typecheck (backend + frontend)
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Prettier format check
        run: npm run format:check

      - name: Audit sicurezza (blocca high+critical)
        run: npm audit --audit-level=high

      - name: Unit tests (vitest + coverage)
        run: npx vitest run --coverage --coverage.thresholds.lines=14
        env:
          NODE_ENV: test

  quality-extended:
    name: Extended Gate (e2e-dry/a11y/docker)
    runs-on: ubuntu-latest
    needs: quality-fast
    timeout-minutes: 20

    steps:
      - name: Checkout codice
        uses: actions/checkout@v4

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Installa dipendenze
        run: npm ci

      - name: E2E dry-run test
        run: npm run test:e2e:dry
        env:
          NODE_ENV: test

      - name: Accessibility smoke test
        run: npm run test:a11y:smoke

      - name: Build immagine Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: linkedin-bot:ci

      - name: Smoke test container (/api/health)
        run: |
          set -euo pipefail
          docker run -d --name linkedin-bot-smoke -p 3000:3000 \
            -e NODE_ENV=test \
            -e SUPABASE_SYNC_ENABLED=false \
            -e DASHBOARD_AUTH_ENABLED=false \
            linkedin-bot:ci node dist/index.js dashboard

          ready=0
          for _ in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/api/health >/dev/null; then
              ready=1
              break
            fi
            sleep 2
          done

          if [ "$ready" -ne 1 ]; then
            echo "Container health endpoint did not become ready"
            docker logs linkedin-bot-smoke || true
            exit 1
          fi

          docker rm -f linkedin-bot-smoke

  codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout codice
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:javascript-typescript'
